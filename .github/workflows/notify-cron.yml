name: notify-cron

# Pings /api/cron/check on alvin-monitor.vercel.app every ~5 minutes so trigger
# notifications fire even when nobody has the dashboard open. Backstop only —
# the dashboard frontend already evaluates the same conditions on each refresh.
#
# GitHub Actions cron is best-effort with 5-15 min jitter under load; that's
# fine for our purposes. Free for public repos and well within the 2k min/mo
# Actions allowance for private.
#
# Required secret: CRON_SECRET — must match the value set in Vercel env.
# Add via: GitHub repo → Settings → Secrets and variables → Actions → New.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (jittered by GitHub)
  workflow_dispatch:        # manual fire-now button in the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit /api/cron/check
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set as a GitHub Actions secret"; exit 1
          fi
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -w "\n--- HTTP %{http_code} · %{time_total}s\n" \
            "https://alvin-monitor.vercel.app/api/cron/check")
          echo "$response"
          # Fail the job if the endpoint didn't return 200
          status=$(echo "$response" | grep -oE 'HTTP [0-9]+' | tail -1 | awk '{print $2}')
          if [ "$status" != "200" ]; then
            echo "::error::cron endpoint returned $status"
            exit 1
          fi
