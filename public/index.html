<script>
const W = "6gYeaEULEH6f6Pu1SpcgnENUonKegjGa8f6GWwreyqQt";
const MS = "9gtkhqMoWh9VcYkBcQ8gESifqspmpuFZp52MkG12zkY4";
const TOKEN_SYMBOLS = {
  'So11111111111111111111111111111111111111112': 'SOL',
  '7vfCXTUXx5WJV5JADk17DUJ4ksgau7utNKj4b963voxs': 'wETH',
  '3NZ9JMVBmGAqocybic2c7LQCJScmgsAZ6vQqTDzcqmJh': 'wBTC',
  'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v': 'USDC',
};
const USDC_MINT = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v";
// Helius calls go through our serverless proxy (api/helius.js); the API key
// lives only in Vercel env, never in the client bundle.
const HELIUS_PROXY = '/api/helius';
const BUDGET_WEEKLY = 125;
const BUDGET_MONTHLY = 500;
const TRACKING_START = new Date('2026-04-28T00:00:00').getTime() / 1000; // tracking start (local), pre-existing activity excluded
const MAX_POS_PCT = 0.05;
const ALLOWED_ASSETS = ['SOL','BTC','ETH','USDC','wBTC','WBTC','mSOL','JitoSOL','USDT'];
const CURFEW_HOUR = 0; // midnight AEST (UTC+10/11)
const sleep = ms => new Promise(r => setTimeout(r, ms));
const short = a => a ? a.slice(0,4)+'..'+a.slice(-4) : '—';
const $ = id => document.getElementById(id);

// ─── State ───
let S = { sol:null, usdc:null, solPrice:null, positions:[], trades:[], allTxns:[], violations:[], weeklyData:[], lastUpdated:null, ms:{ sol:null, usdc:null, positions:[] }, approvals:{}, audit:[] };

function tokenSymbol(mint) { return TOKEN_SYMBOLS[mint] || (mint ? short(mint) : '?'); }
const numish = v => typeof v === 'string' ? parseFloat(v) || 0 : (v || 0);

async function fetchPositions(addr) {
  try {
    const r = await fetch(`https://perps-api.jup.ag/v1/positions?walletAddress=${addr}`);
    if (!r.ok) return [];
    const d = await r.json();
    return d?.dataList || [];
  } catch { return []; }
}

const REFRESH_MS = 60_000; // auto-refresh interval

// ─── Identity (localStorage, used as the 'by' on each approval) ───
function loadIdentity() { try { return localStorage.getItem('alvin_identity') || ''; } catch { return ''; } }
function saveIdentity(v) { try { localStorage.setItem('alvin_identity', v); } catch {} rerenderApprovalUI(); }

// ─── Approvals (Vercel KV, shared between Alvin and Ken) ───
// REVENGE / WALLET / COOLDOWN need both Alvin AND Ken to approve before clearing.
// Other types clear with a single approval.
const DUAL_APPROVAL_TYPES = new Set(['REVENGE', 'WALLET', 'COOLDOWN']);
function violationKey(v) { return `${v.type}|${v.sig||''}|${v.time||0}`; }
function parseApprovers(raw) {
  if (!raw) return [];
  if (raw.by && raw.at) return [{ by: raw.by, at: raw.at }];
  return Object.entries(raw).map(([by, v]) => ({ by, at: v?.at || 0 }));
}
function approversOf(key) { return parseApprovers(S.approvals[key]); }
function requiredFor(type) { return DUAL_APPROVAL_TYPES.has(type) ? 2 : 1; }
function isApproved(key, type) { return approversOf(key).length >= requiredFor(type); }
function meHasApproved(key) {
  const me = loadIdentity();
  return !!me && approversOf(key).some(a => a.by === me);
}

async function fetchSharedApprovals() {
  try {
    const r = await fetch('/api/approvals');
    if (!r.ok) return;
    const d = await r.json();
    S.approvals = d.approvals || {};
    S.audit = d.audit || [];
  } catch {}
}

function refreshApprovalState() {
  S.violations.forEach(v => {
    const k = violationKey(v);
    v.approvers = approversOf(k);
    v.approved = v.approvers.length >= requiredFor(v.type);
  });
}

function rerenderApprovalUI() {
  refreshApprovalState();
  if (typeof renderOverview === 'function') {
    renderOverview(); renderTrades(); renderCompliance(); renderWeekly(); renderAlerts(); tickCooldown();
  }
}

async function toggleApproval(key) {
  const by = loadIdentity();
  if (!by) {
    alert('Pick your identity (Alvin or Ken) at the top right first.');
    return;
  }
  const action = meHasApproved(key) ? 'unapprove' : 'approve';
  const at = Date.now();
  // optimistic local merge — preserves the other party's approval if any
  const prevRaw = S.approvals[key];
  const merged = (() => {
    const e = prevRaw?.by && prevRaw?.at ? { [prevRaw.by]: { at: prevRaw.at } } : { ...(prevRaw || {}) };
    if (action === 'approve') e[by] = { at };
    else delete e[by];
    return e;
  })();
  if (Object.keys(merged).length === 0) delete S.approvals[key];
  else S.approvals[key] = merged;
  S.audit.unshift({ action, key, by, at });
  rerenderApprovalUI();
  try {
    const r = await fetch('/api/approvals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, key, by }),
    });
    if (!r.ok) throw new Error(await r.text());
  } catch (e) {
    // rollback on failure
    if (prevRaw === undefined) delete S.approvals[key];
    else S.approvals[key] = prevRaw;
    rerenderApprovalUI();
    alert('Failed to save: ' + e.message);
  }
}

// ─── SOL price (CoinGecko, no key) ───
async function fetchSolPrice() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
    const d = await r.json();
    return d?.solana?.usd ?? null;
  } catch { return null; }
}

// ─── RPC ───
async function rpc(method, params) {
  for (let i=0; i<3; i++) {
    try {
      const r = await fetch(HELIUS_PROXY, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({jsonrpc:"2.0",id:1,method,params})});
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      return d.result;
    } catch(e) { if (i===2) throw e; await sleep(1000*(i+1)); }
  }
}

// ─── Helius Enhanced Transactions ───
async function fetchAllTrades() {
  let all = [], lastSig = null, page = 0;
  setStatus('Fetching trades…');
  while (page < 10) { // max 1000 txns
    let url = `${HELIUS_PROXY}?address=${W}&limit=100`;
    if (lastSig) url += '&before=' + lastSig;
    const r = await fetch(url);
    if (!r.ok) throw new Error('Helius API: ' + r.status);
    const batch = await r.json();
    if (!batch.length) break;
    all.push(...batch);
    lastSig = batch[batch.length-1].signature;
    page++;
    setStatus(`Fetched ${all.length} transactions…`);
    $('pBar').style.width = Math.min(90, 20 + page*8) + '%';
    await sleep(300);
  }
  return all;
}

// ─── Parse Jupiter Trades ───
function parseTrades(txns) {
  const trades = [];
  for (const tx of txns) {
    if (!tx.timestamp) continue;
    const isJup = tx.source === 'JUPITER' || (tx.description||'').toLowerCase().includes('jupiter') || (tx.type === 'SWAP' && tx.events?.swap);
    const isPerp = (tx.description||'').toLowerCase().includes('perp');
    
    if (isJup || isPerp || tx.type === 'SWAP') {
      const swap = tx.events?.swap;
      const desc = tx.description || '';
      
      let tokenIn = null, tokenOut = null, amtIn = 0, amtOut = 0;
      
      if (swap) {
        const ni = swap.nativeInput;
        const no_ = swap.nativeOutput;
        const ti = swap.tokenInputs || [];
        const to = swap.tokenOutputs || [];
        
        if (ni && ni.amount > 0) { tokenIn = 'SOL'; amtIn = ni.amount / 1e9; }
        if (no_ && no_.amount > 0) { tokenOut = 'SOL'; amtOut = no_.amount / 1e9; }
        if (ti.length) { tokenIn = ti[0].symbol || ti[0].mint?.slice(0,6) || 'TOKEN'; amtIn = ti[0].rawTokenAmount ? ti[0].rawTokenAmount.tokenAmount / Math.pow(10, ti[0].rawTokenAmount.decimals||6) : 0; }
        if (to.length) { tokenOut = to[0].symbol || to[0].mint?.slice(0,6) || 'TOKEN'; amtOut = to[0].rawTokenAmount ? to[0].rawTokenAmount.tokenAmount / Math.pow(10, to[0].rawTokenAmount.decimals||6) : 0; }
      }
      
      // Also check tokenTransfers
      if (!tokenIn && tx.tokenTransfers?.length) {
        for (const t of tx.tokenTransfers) {
          if (t.fromUserAccount === W) { tokenIn = t.symbol || t.mint?.slice(0,6) || 'TOKEN'; amtIn = t.tokenAmount || 0; }
          if (t.toUserAccount === W) { tokenOut = t.symbol || t.mint?.slice(0,6) || 'TOKEN'; amtOut = t.tokenAmount || 0; }
        }
      }
      
      // Calculate USDC P&L
      let usdcIn = 0, usdcOut = 0;
      if (tokenIn === 'USDC' || tokenIn === 'USDT') usdcIn = amtIn;
      if (tokenOut === 'USDC' || tokenOut === 'USDT') usdcOut = amtOut;
      
      const date = new Date(tx.timestamp * 1000);
      const hour = date.getHours(); // local time
      
      trades.push({
        sig: tx.signature,
        time: tx.timestamp,
        date,
        type: isPerp ? 'Perp' : 'Swap',
        desc: desc.substring(0, 120),
        tokenIn, tokenOut, amtIn, amtOut,
        usdcIn, usdcOut,
        pnl: usdcOut - usdcIn,
        fee: tx.fee ? tx.fee / 1e9 : 0,
        source: tx.source || 'Unknown',
        hour,
        dayOfWeek: date.getDay(),
        weekKey: getWeekKey(date),
      });
    }
  }
  return trades.sort((a,b) => b.time - a.time);
}

function getWeekKey(d) {
  const start = new Date(d); start.setDate(start.getDate() - start.getDay() + 1);
  return start.toISOString().slice(0,10);
}

// ─── Compliance Check ───
function checkCompliance(trades) {
  const violations = [];
  
  for (let i = 0; i < trades.length; i++) {
    const t = trades[i];
    
    // 1. Asset check
    const assets = [t.tokenIn, t.tokenOut].filter(Boolean);
    const nonAllowed = assets.filter(a => !ALLOWED_ASSETS.some(al => a.toUpperCase().includes(al.toUpperCase())));
    if (nonAllowed.length) {
      violations.push({ type: 'ASSET', severity: 'warn', time: t.time, sig: t.sig, detail: `Traded ${nonAllowed.join(', ')} · rule allows BTC/SOL/ETH/USDC only` });
    }

    // 2. Position size check (USDC margin > 10% of weekly budget — 2x the 5% rule, since 200x leverage makes margin a fuzzy proxy)
    if (t.usdcIn > BUDGET_WEEKLY * MAX_POS_PCT * 2) {
      const pct = (t.usdcIn / BUDGET_WEEKLY) * 100;
      violations.push({ type: 'SIZE', severity: 'warn', time: t.time, sig: t.sig, detail: `Trade margin $${t.usdcIn.toFixed(2)} is ${pct.toFixed(0)}% of weekly budget · rule is 5% max ($${(BUDGET_WEEKLY*MAX_POS_PCT).toFixed(2)})` });
    }

    // 3. Curfew check (no trading midnight–6am local)
    if (t.hour >= 0 && t.hour < 6) {
      const hh = String(t.date.getHours()).padStart(2,'0'), mm = String(t.date.getMinutes()).padStart(2,'0');
      violations.push({ type: 'CURFEW', severity: 'info', time: t.time, sig: t.sig, detail: `Trade at ${hh}:${mm} · rule is no trading 12am–6am` });
    }

    // 4. Revenge trade detection (trade within 10 min of a losing previous trade)
    if (i < trades.length - 1) {
      const prev = trades[i + 1];
      if (prev.pnl < -0.5 && (t.time - prev.time) < 600) {
        const mins = Math.max(1, Math.floor((t.time-prev.time)/60));
        violations.push({ type: 'REVENGE', severity: 'alert', time: t.time, sig: t.sig, detail: `Trade ${mins}min after a $${Math.abs(prev.pnl).toFixed(2)} loss · rule is 10min cooldown after losses` });
      }
    }
  }

  // 5. Weekly budget check
  const weeks = {};
  trades.forEach(t => {
    if (!weeks[t.weekKey]) weeks[t.weekKey] = { spent: 0, trades: 0 };
    weeks[t.weekKey].spent += t.usdcIn;
    weeks[t.weekKey].trades++;
  });

  for (const [wk, data] of Object.entries(weeks)) {
    if (data.spent > BUDGET_WEEKLY * 1.5) {
      violations.push({ type: 'BUDGET', severity: 'alert', time: 0, sig: 'budget:' + wk, detail: `Week of ${wk}: spent $${data.spent.toFixed(2)} · rule is $${BUDGET_WEEKLY} max` });
    }
  }
  
  return violations.sort((a,b) => b.time - a.time);
}

// ─── Weekly Aggregation ───
function aggregateWeekly(trades) {
  const weeks = {};
  trades.forEach(t => {
    if (!weeks[t.weekKey]) weeks[t.weekKey] = { key: t.weekKey, trades: [], totalPnl: 0, wins: 0, losses: 0, volume: 0, count: 0, revenges: 0 };
    const w = weeks[t.weekKey];
    w.trades.push(t);
    w.totalPnl += t.pnl;
    w.volume += t.usdcIn;
    w.count++;
    if (t.pnl > 0) w.wins++; else if (t.pnl < 0) w.losses++;
  });
  return Object.values(weeks).sort((a,b) => b.key.localeCompare(a.key));
}

// ─── Tab Switching ───
function stab(n, el) {
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
  $('tab-'+n).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// ─── Helpers ───
function fmtT(ts) { if (!ts) return '—'; return new Date(ts*1000).toLocaleDateString('en-AU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function ago(ts) { if (!ts) return ''; const d=Date.now()/1000-ts; if(d<60)return 'now';if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d'; }
function pnlClass(v) { return v > 0 ? 'win' : v < 0 ? 'loss' : 'neutral'; }
function pnlStr(v) { return v > 0 ? '+$'+v.toFixed(2) : v < 0 ? '-$'+Math.abs(v).toFixed(2) : '$0.00'; }
function setStatus(t) { $('statusDot').innerHTML = '<span style="color:#f59e0b">●</span> ' + t; }

// ─── Pre-trade self-check ───
function tradeCheck() {
  const checks = [];
  const now = new Date(), hour = now.getHours(), min = now.getMinutes();

  if (hour >= 0 && hour < 6) {
    checks.push({ ok:false, name:'Curfew', reason:`In curfew · ${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')} (12am–6am)` });
  } else if (hour >= 23) {
    const mins = (24-hour)*60 - min;
    checks.push({ ok:false, name:'Curfew', reason:`${mins}min to midnight · too close, stop now` });
  } else if (hour >= 22) {
    const mins = (24-hour)*60 - min;
    checks.push({ ok:'warn', name:'Curfew', reason:`${mins}min to midnight · wind down soon` });
  } else {
    checks.push({ ok:true, name:'Curfew', reason:'Outside curfew window' });
  }

  const cd = isInCooldown();
  if (cd) checks.push({ ok:false, name:'Cooldown', reason:cd.reason + ' · override from banner if needed' });
  else checks.push({ ok:true, name:'Cooldown', reason:'Weekly budget available' });

  if (S.solPrice && S.sol !== null) {
    const wallet = S.sol * S.solPrice + (S.usdc||0);
    if (wallet > BUDGET_WEEKLY) {
      const walletKey = `WALLET|wallet:${getWeekKey(new Date())}|0`;
      const approved = isApproved(walletKey, 'WALLET');
      checks.push(approved
        ? { ok:'warn', name:'Wallet size', reason:`Wallet $${wallet.toFixed(2)} > $${BUDGET_WEEKLY} (approved by you)` }
        : { ok:false, name:'Wallet size', reason:`Wallet $${wallet.toFixed(2)} > $${BUDGET_WEEKLY} · approve in Compliance to proceed` });
    } else {
      checks.push({ ok:true, name:'Wallet size', reason:`$${wallet.toFixed(2)} within budget` });
    }
  }

  const lastTrade = S.trades[0];
  if (lastTrade && lastTrade.pnl < -0.5) {
    const sinceSec = (Date.now()/1000) - lastTrade.time;
    if (sinceSec < 600) {
      const left = Math.ceil((600 - sinceSec) / 60);
      checks.push({ ok:false, name:'Post-loss', reason:`Last trade lost $${Math.abs(lastTrade.pnl).toFixed(2)} · wait ${left}min more (rule: 10min)` });
    } else {
      checks.push({ ok:true, name:'Post-loss', reason:'10min cooldown after last loss has cleared' });
    }
  } else {
    checks.push({ ok:true, name:'Post-loss', reason:'No recent loss in window' });
  }

  return checks;
}

// ─── Render Functions ───
function renderOverview() {
  const totalPnl = S.trades.reduce((s,t) => s + t.pnl, 0);
  const wins = S.trades.filter(t => t.pnl > 0).length;
  const losses = S.trades.filter(t => t.pnl < 0).length;
  const winRate = S.trades.length > 0 ? (wins / S.trades.length * 100) : 0;
  const totalVol = S.trades.reduce((s,t) => s + t.usdcIn, 0);
  const avgTrade = S.trades.length > 0 ? totalVol / S.trades.length : 0;
  const alerts = S.violations.filter(v => v.severity === 'alert' && !v.approved).length;
  const warns = S.violations.filter(v => v.severity === 'warn' && !v.approved).length;
  
  // Today vs yesterday window (local midnight boundaries)
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const ydayStart = new Date(todayStart); ydayStart.setDate(ydayStart.getDate() - 1);
  const todayStartSec = todayStart.getTime()/1000, ydayStartSec = ydayStart.getTime()/1000;
  const todayTrades = S.trades.filter(t => t.time >= todayStartSec);
  const ydayTrades = S.trades.filter(t => t.time >= ydayStartSec && t.time < todayStartSec);
  const todayPnl = todayTrades.reduce((s,t) => s + t.pnl, 0);
  const ydayPnl = ydayTrades.reduce((s,t) => s + t.pnl, 0);

  const cards = [
    {l:'SOL',v:S.sol!==null?S.sol.toFixed(4):'…',u:'balance',c:'#9945ff'},
    {l:'USDC',v:S.usdc!==null?S.usdc.toFixed(2):'…',u:'balance',c:'#2775ca'},
    {l:'Today P&L',v:pnlStr(todayPnl),u:`${todayTrades.length} trade${todayTrades.length===1?'':'s'} · y'day ${pnlStr(ydayPnl)}`,c:todayPnl>=0?'#22c55e':'#ef4444'},
    {l:'Total P&L',v:pnlStr(totalPnl),u:'all trades',c:totalPnl>=0?'#22c55e':'#ef4444'},
    {l:'Trades',v:S.trades.length,u:'Jupiter swaps',c:'#8b5cf6'},
    {l:'Win Rate',v:winRate.toFixed(0)+'%',u:`${wins}W / ${losses}L`,c:winRate>=50?'#22c55e':'#ef4444'},
    {l:'Avg Size',v:'$'+avgTrade.toFixed(2),u:'per trade',c:'#f59e0b'},
    {l:'Volume',v:'$'+totalVol.toFixed(2),u:'total traded',c:'#06b6d4'},
    {l:'Violations',v:alerts+warns,u:alerts?alerts+' critical':'all clear',c:alerts?'#ef4444':warns?'#f59e0b':'#22c55e'},
  ];
  
  const solValue = (S.sol||0) * (S.solPrice||0);
  const totalUsd = solValue + (S.usdc||0);
  const haveBalances = S.sol !== null || S.usdc !== null;
  const breakdown = S.solPrice
    ? `${(S.sol||0).toFixed(4)} SOL ($${solValue.toFixed(2)}) + $${(S.usdc||0).toFixed(2)} USDC · SOL @ $${S.solPrice.toFixed(2)}`
    : `${(S.sol||0).toFixed(4)} SOL + $${(S.usdc||0).toFixed(2)} USDC · SOL price unavailable`;
  let html = `<div class="panel" style="background:linear-gradient(135deg,#0f1923,#1a1f35);padding:20px"><div class="pl">Wallet Value</div><div style="font-size:clamp(22px,6vw,32px);font-weight:700;color:#e2e8f0;font-variant-numeric:tabular-nums;letter-spacing:.5px">${haveBalances?'$'+totalUsd.toFixed(2):'…'}</div><div style="font-size:11px;color:#64748b;margin-top:6px;line-height:1.4">${breakdown}</div></div>`;
  html += renderPositionsPanel(S.positions);
  html += `<div class="cards">${cards.map(c=>`<div class="card" style="border:1px solid ${c.c}30"><div class="cs" style="background:${c.c}"></div><div class="cl">${c.l}</div><div class="cv" style="color:${c.c}">${c.v}</div><div class="cu">${c.u}</div></div>`).join('')}</div>`;
  
  // Budget gauge — driven by total wallet USD (SOL + USDC)
  if (haveBalances) {
    const wallet = totalUsd;
    const pct = Math.min(100, (wallet/BUDGET_WEEKLY)*100), over = wallet > BUDGET_WEEKLY;
    const gc = over ? '#ef4444' : wallet > BUDGET_WEEKLY*.5 ? '#f59e0b' : '#22c55e';
    const trackLabel = new Date(TRACKING_START*1000).toLocaleDateString('en-AU',{day:'2-digit',month:'short'});
    html += `<div class="panel"><div class="pl">Budget: $${wallet.toFixed(2)} / $${BUDGET_WEEKLY} weekly · tracking from ${trackLabel}</div><div class="gtrk"><div class="gfil" style="width:${pct}%;background:${gc}"></div></div><div class="glbl"><span style="color:#94a3b8">$${wallet.toFixed(2)} in wallet</span><span style="color:${over?'#ef4444':'#64748b'}">${over?'⚠ $'+(wallet-BUDGET_WEEKLY).toFixed(2)+' OVER':'$'+(BUDGET_WEEKLY-wallet).toFixed(2)+' remaining'}</span></div></div>`;
  }
  
  // Pre-trade self-check
  const checks = tradeCheck();
  const blocked = checks.filter(c => c.ok === false);
  const cautions = checks.filter(c => c.ok === 'warn');
  const verdict = blocked.length
    ? { color:'#ef4444', bg:'#dc262610', icon:'✗', text:`NO · ${blocked.length} blocking` }
    : cautions.length
    ? { color:'#f59e0b', bg:'#f59e0b10', icon:'⚠', text:'PROCEED WITH CAUTION' }
    : { color:'#22c55e', bg:'#22c55e10', icon:'✓', text:'GO · all clear' };
  html += `<div class="panel" style="border-left:3px solid ${verdict.color};background:${verdict.bg}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div class="pl" style="margin:0">Pre-trade check</div><div style="font-size:14px;font-weight:700;color:${verdict.color}">${verdict.icon} ${verdict.text}</div></div>`;
  html += checks.map(c => {
    const i = c.ok === true ? '✓' : c.ok === 'warn' ? '⚠' : '✗';
    const co = c.ok === true ? '#22c55e' : c.ok === 'warn' ? '#f59e0b' : '#ef4444';
    return `<div style="padding:5px 0;font-size:11px;display:flex;gap:10px;align-items:flex-start"><span style="color:${co};font-weight:700;width:14px;flex-shrink:0">${i}</span><span style="color:#94a3b8;min-width:100px;flex-shrink:0">${c.name}</span><span style="color:#64748b;flex:1">${c.reason}</span></div>`;
  }).join('');
  html += `</div>`;

  // Recent trades
  html += `<div class="panel"><div class="pl">Last 5 Trades</div>`;
  if (S.trades.length) {
    html += S.trades.slice(0,5).map(t => `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b;font-size:11px">
      <div><span style="color:#e2e8f0">${t.tokenIn||'?'} → ${t.tokenOut||'?'}</span> <span style="color:#475569;font-size:9px">${fmtT(t.time)} · ${ago(t.time)}</span></div>
      <div style="text-align:right"><span class="${pnlClass(t.pnl)}" style="font-weight:600">${pnlStr(t.pnl)}</span> <a href="https://solscan.io/tx/${t.sig}" target="_blank" style="font-size:9px;margin-left:6px">${short(t.sig)} ↗</a></div>
    </div>`).join('');
  } else { html += '<div style="color:#475569;font-size:12px;text-align:center;padding:16px">No Jupiter trades found</div>'; }
  html += '</div>';
  
  // Trading hour heatmap
  if (S.trades.length > 2) {
    const hours = Array(24).fill(0);
    S.trades.forEach(t => hours[t.hour]++);
    const max = Math.max(...hours, 1);
    html += `<div class="panel"><div class="pl">Trading Hours (local time)</div><div class="vbar" style="height:50px">`;
    for (let h=0;h<24;h++) {
      const ht = hours[h] > 0 ? Math.max(4, (hours[h]/max)*50) : 2;
      const danger = h >= 0 && h < 6;
      html += `<div title="${h}:00 — ${hours[h]} trades" style="height:${ht}px;flex:1;background:${danger&&hours[h]>0?'#ef4444':'#3b82f6'};opacity:${hours[h]>0?1:0.15}"></div>`;
    }
    html += `</div><div style="display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-top:4px"><span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>12am</span></div></div>`;
  }
  
  $('tab-overview').innerHTML = html;
}

function renderCompliance() {
  const counts = { REVENGE:0, CURFEW:0, ASSET:0, SIZE:0, BUDGET:0, WALLET:0 };
  S.violations.forEach(v => { if (!v.approved) counts[v.type] = (counts[v.type]||0) + 1; });

  const rules = [
    { name: 'Wallet Budget', key: 'WALLET', icon: '👛', desc: 'Wallet value within $125 weekly limit', severity: counts.WALLET > 0 ? 'alert' : 'ok' },
    { name: 'Revenge Trading', key: 'REVENGE', icon: '🔥', desc: 'Trading within 10 min of a loss', severity: counts.REVENGE > 0 ? 'alert' : 'ok' },
    { name: 'Trade Spend', key: 'BUDGET', icon: '💰', desc: 'Weekly trade spend within $125 limit', severity: counts.BUDGET > 0 ? 'alert' : 'ok' },
    { name: 'Position Sizing', key: 'SIZE', icon: '📏', desc: 'Entries within 5% of weekly budget', severity: counts.SIZE > 0 ? 'warn' : 'ok' },
    { name: 'Approved Assets', key: 'ASSET', icon: '🪙', desc: 'BTC, SOL, ETH perps only', severity: counts.ASSET > 0 ? 'warn' : 'ok' },
    { name: 'Curfew (Midnight)', key: 'CURFEW', icon: '🌙', desc: 'No trading between 12am–6am', severity: counts.CURFEW > 0 ? 'warn' : 'ok' },
  ];
  
  let html = `<div style="margin-bottom:16px">`;
  for (const r of rules) {
    const cls = r.severity === 'alert' ? 'alert' : r.severity === 'warn' ? 'warn' : 'ok';
    const cnt = counts[r.key] || 0;
    const statusIcon = cnt === 0 ? '<span style="color:#22c55e;font-weight:700">✓ PASS</span>' : `<span style="color:${r.severity==='alert'?'#ef4444':'#f59e0b'};font-weight:700">${cnt} violation${cnt>1?'s':''}</span>`;
    html += `<div class="rule ${cls}">
      <span style="font-size:20px;width:32px;text-align:center">${r.icon}</span>
      <div style="flex:1"><div style="font-size:12px;color:#e2e8f0;font-weight:600">${r.name}</div><div style="font-size:10px;color:#64748b;margin-top:2px">${r.desc}</div></div>
      <div>${statusIcon}</div>
    </div>`;
  }
  html += '</div>';
  
  // Violation log
  if (S.violations.length) {
    const openCount = S.violations.filter(v => !v.approved).length;
    html += `<div class="panel"><div class="pl">Violation Log — ${S.violations.length} total · ${openCount} open</div>`;
    html += `<div style="max-height:400px;overflow-y:auto">`;
    for (const v of S.violations.slice(0, 50)) {
      const colors = { alert:'#ef4444', warn:'#f59e0b', info:'#3b82f6' };
      const k = violationKey(v);
      const isTradeSig = v.sig && !v.sig.startsWith('wallet:') && !v.sig.startsWith('budget:');
      const dual = DUAL_APPROVAL_TYPES.has(v.type);
      const me = loadIdentity();
      const meDid = (v.approvers||[]).some(a => a.by === me);
      const byNames = (v.approvers||[]).map(a => a.by).join(' & ') || '—';
      const subtitle = !v.approvers?.length ? '' :
        v.approved ? `<span style="color:#22c55e">✓ approved by ${byNames}</span>` :
        `<span style="color:#f59e0b">⚠ ${byNames} approved · awaiting ${(v.approvers[0].by==='alvin'?'Ken':'Alvin')}</span>`;
      const btnLabel = meDid ? '✓ undo my approval' : (dual && v.approvers?.length===1 ? `approve (2nd of 2)` : 'approve');
      const btnStyle = meDid
        ? 'background:none;border:1px solid #22c55e50;color:#22c55e;padding:3px 8px;border-radius:3px;font-size:9px;cursor:pointer;font-family:inherit;white-space:nowrap'
        : 'background:#1e293b;border:1px solid #475569;color:#94a3b8;padding:3px 8px;border-radius:3px;font-size:9px;cursor:pointer;font-family:inherit;white-space:nowrap';
      const approveBtn = `<button onclick="toggleApproval('${k}')" style="${btnStyle}">${btnLabel}</button>`;
      html += `<div style="padding:8px 0;border-bottom:1px solid #1e293b;font-size:11px;display:flex;gap:10px;align-items:center;${v.approved?'opacity:.45':''}">
        <span class="tag" style="background:${colors[v.severity]}20;color:${colors[v.severity]};min-width:60px;text-align:center">${v.type}</span>
        <div style="flex:1"><div style="color:#e2e8f0">${v.detail}</div>${v.time||isTradeSig||subtitle?`<div style="color:#475569;font-size:9px;margin-top:2px">${v.time?fmtT(v.time):''}${isTradeSig?` · <a href="https://solscan.io/tx/${v.sig}" target="_blank">${short(v.sig)} ↗</a>`:''}${subtitle?` · ${subtitle}`:''}</div>`:''}</div>
        ${approveBtn}
      </div>`;
    }
    html += '</div></div>';
  } else {
    html += '<div class="panel" style="text-align:center;color:#22c55e;padding:20px">✓ No violations detected</div>';
  }

  // Audit log — every approval/unapproval ever recorded, newest first
  if (S.audit?.length) {
    html += `<div class="panel"><div class="pl">Audit Log · ${S.audit.length} ${S.audit.length === 1 ? 'entry' : 'entries'}</div><div style="max-height:300px;overflow-y:auto">`;
    for (const a of S.audit.slice(0, 100)) {
      const isApprove = a.action === 'approve';
      const c = isApprove ? '#22c55e' : '#94a3b8';
      const verb = isApprove ? 'approved' : 'unapproved';
      const type = (a.key || '').split('|')[0] || '?';
      html += `<div style="padding:6px 0;border-bottom:1px solid #1e293b;font-size:11px;display:flex;gap:10px;align-items:center"><span style="color:${c};font-weight:600;min-width:90px"><strong>${a.by||'?'}</strong> ${verb}</span><span style="color:#64748b;font-family:inherit;font-size:10px">${type}</span><span style="color:#475569;flex:1;text-align:right;font-size:10px">${a.at?fmtT(a.at/1000)+' · '+ago(a.at/1000):''}</span></div>`;
    }
    html += '</div></div>';
  }

  $('tab-compliance').innerHTML = html;
}

function downloadWeeklyCsv() {
  const headers = ['Week','Trades','Volume USD','P&L USD','Wins','Losses','Win Rate %','Over Budget'];
  const rows = S.weeklyData.map(w => [
    w.key, w.count, w.volume.toFixed(2), w.totalPnl.toFixed(2),
    w.wins, w.losses, w.count ? (w.wins/w.count*100).toFixed(0) : '0',
    w.volume > BUDGET_WEEKLY ? 'yes' : 'no',
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `alvin-weekly-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

  if (S.weeklyData.length > 1) {
    const maxPnl = Math.max(...S.weeklyData.map(w => Math.abs(w.totalPnl)), 1);
    html += `<div class="panel"><div class="pl">Weekly P&L</div><div style="display:flex;align-items:center;gap:3px;height:80px;padding-top:40px;position:relative">`;
    html += `<div style="position:absolute;top:39px;left:0;right:0;border-top:1px dashed #475569"></div>`;
    for (const w of [...S.weeklyData].reverse()) {
      const ht = Math.max(4, (Math.abs(w.totalPnl)/maxPnl)*38);
      const isWin = w.totalPnl >= 0;
      html += `<div title="${w.key}: ${pnlStr(w.totalPnl)}" style="flex:1;height:${ht}px;background:${isWin?'#22c55e':'#ef4444'};border-radius:2px;${isWin?'align-self:flex-start;margin-top:'+(40-ht)+'px':'align-self:flex-end;margin-top:40px'}"></div>`;
    }
    html += `</div><div style="display:flex;justify-content:space-between;font-size:8px;color:#475569;margin-top:4px"><span>${S.weeklyData[S.weeklyData.length-1]?.key||''}</span><span>${S.weeklyData[0]?.key||''}</span></div></div>`;
  }
  
  $('tab-weekly').innerHTML = html;
}

function renderRules() {
  const rs = [
    {r:'Weekly budget',v:'$125 USDC released every Monday',c:'💰'},
    {r:'Max entry',v:'5% of weekly (~$6.25). Start at 1%',c:'📏'},
    {r:'Leverage',v:'200x — liquidation = stop loss',c:'⚡'},
    {r:'Positions',v:'6 max (3L/3S). BTC, SOL, ETH perps only',c:'📊'},
    {r:'Cooldown',v:'Budget blown → wait till next Monday',c:'⏸'},
    {r:'Curfew',v:'In bed by midnight',c:'🌙'},
    {r:'Post-loss',v:'Message Ken before resuming after blown week',c:'💬'},
    {r:'Escalation',v:'External reload → Ken notifies Queenie',c:'🚨',a:1},
    {r:'The goal',v:'Get bored. Make it feel like work.',c:'🎯'},
  ];
  $('tab-rules').innerHTML = rs.map(x=>`<div class="rule ${x.a?'alert':''}"><span style="font-size:18px;width:28px;text-align:center">${x.c}</span><div><div style="font-size:10px;color:${x.a?'#ef4444':'#f59e0b'};font-weight:700;text-transform:uppercase;letter-spacing:1px">${x.r}</div><div style="font-size:13px;color:#e2e8f0;margin-top:2px">${x.v}</div></div></div>`).join('') + '<div style="margin-top:18px;padding:16px;background:#1e293b;border-radius:8px;text-align:center;font-size:13px;color:#94a3b8;font-style:italic">"The goal is not to win trades. The goal is to get bored."</div>';
}

// ─── Position rendering ───
function renderPositionCard(p) {
  const side = (p.side || 'pos').toLowerCase();
  const sideColor = side === 'long' ? '#22c55e' : side === 'short' ? '#ef4444' : '#64748b';
  const mkt = tokenSymbol(p.marketMint || p.market || p.indexToken);
  const sizeUsd = numish(p.sizeUsd ?? p.size);
  const collat = numish(p.collateralUsd ?? p.collateral);
  const entry = numish(p.entryPrice ?? p.averagePrice);
  const mark = numish(p.markPrice ?? p.currentPrice ?? p.indexPrice);
  const liq = numish(p.liquidationPrice);
  const pnl = numish(p.pnlAfterFeesUsd ?? p.pnl ?? p.pnlAfterFees);
  const lev = numish(p.leverage) || (sizeUsd && collat ? sizeUsd / collat : 0);
  let liqDist = 0;
  if (liq > 0 && mark > 0) liqDist = side === 'long' ? ((mark - liq) / mark) * 100 : ((liq - mark) / mark) * 100;
  const liqColor = liqDist > 0 && liqDist < 5 ? '#ef4444' : liqDist < 15 ? '#f59e0b' : '#22c55e';
  const pnlColor = pnl >= 0 ? '#22c55e' : '#ef4444';
  const links = [];
  if (p.positionPubkey) links.push(`<a href="https://solscan.io/account/${p.positionPubkey}" target="_blank" style="color:#3b82f6">Solscan ↗</a>`);
  links.push(`<a href="https://jup.ag/perps-legacy/${side}/1-${(mkt||'SOL').toLowerCase()}" target="_blank" style="color:#3b82f6">Jupiter ↗</a>`);
  return `<div style="border:1px solid ${sideColor}30;border-left:3px solid ${sideColor};border-radius:8px;padding:14px;margin-bottom:8px;background:#0f1923">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <div><div style="font-size:14px;font-weight:700;color:${sideColor}">${side.toUpperCase()} ${mkt}</div><div style="font-size:10px;color:#64748b;margin-top:2px">${lev.toFixed(1)}x · $${sizeUsd.toFixed(2)} size · $${collat.toFixed(2)} collateral</div></div>
      <div style="text-align:right"><div style="font-size:16px;font-weight:700;color:${pnlColor};font-variant-numeric:tabular-nums">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</div><div style="font-size:9px;color:#64748b">unrealized P&L</div></div>
    </div>
    <div style="font-size:11px;color:#94a3b8;display:flex;gap:14px;flex-wrap:wrap;font-variant-numeric:tabular-nums;margin-bottom:6px"><span>Entry $${entry.toFixed(2)}</span><span>Mark $${mark.toFixed(2)}</span>${liq>0?`<span style="color:${liqColor}">Liq $${liq.toFixed(2)} · ${liqDist.toFixed(1)}% away</span>`:''}</div>
    <div style="font-size:10px;display:flex;gap:12px">${links.join(' · ')}</div>
  </div>`;
}

function renderPositionsPanel(positions, label = 'Open Positions') {
  if (!positions?.length) return '';
  const totalPnl = positions.reduce((s,p) => s + numish(p.pnlAfterFeesUsd ?? p.pnl ?? p.pnlAfterFees), 0);
  const totalSize = positions.reduce((s,p) => s + numish(p.sizeUsd ?? p.size), 0);
  const pnlColor = totalPnl >= 0 ? '#22c55e' : '#ef4444';
  return `<div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div class="pl" style="margin:0">${label} · ${positions.length}</div><div style="font-size:11px;color:#94a3b8;font-variant-numeric:tabular-nums">$${totalSize.toFixed(2)} total · <span style="color:${pnlColor};font-weight:600">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)} P&L</span></div></div>${positions.map(renderPositionCard).join('')}</div>`;
}

// ─── Multisig tab ───
function renderMultisig() {
  const sol = S.ms.sol, usdc = S.ms.usdc;
  const haveBal = sol !== null;
  const solValue = (sol||0) * (S.solPrice||0);
  const totalUsd = solValue + (usdc||0);
  const breakdown = S.solPrice
    ? `${(sol||0).toFixed(4)} SOL ($${solValue.toFixed(2)}) + $${(usdc||0).toFixed(2)} USDC · SOL @ $${S.solPrice.toFixed(2)}`
    : `${(sol||0).toFixed(4)} SOL + $${(usdc||0).toFixed(2)} USDC · SOL price unavailable`;
  let html = `<div class="panel" style="background:linear-gradient(135deg,#0f1923,#1a1f35);padding:20px"><div class="pl">Multisig Wallet Value</div><div style="font-size:clamp(22px,6vw,32px);font-weight:700;color:#e2e8f0;font-variant-numeric:tabular-nums;letter-spacing:.5px">${haveBal?'$'+totalUsd.toFixed(2):'…'}</div><div style="font-size:11px;color:#64748b;margin-top:6px;line-height:1.4">${breakdown} · <a href="https://solscan.io/account/${MS}" target="_blank">${short(MS)} ↗</a></div></div>`;
  html += renderPositionsPanel(S.ms.positions, 'Multisig Open Positions');
  html += `<div class="cards"><div class="card" style="border:1px solid #9945ff30"><div class="cs" style="background:#9945ff"></div><div class="cl">SOL</div><div class="cv" style="color:#9945ff">${sol!==null?sol.toFixed(4):'…'}</div><div class="cu">balance</div></div><div class="card" style="border:1px solid #2775ca30"><div class="cs" style="background:#2775ca"></div><div class="cl">USDC</div><div class="cv" style="color:#2775ca">${usdc!==null?usdc.toFixed(2):'…'}</div><div class="cu">balance</div></div></div>`;
  if (!S.ms.positions?.length) html += '<div class="panel" style="text-align:center;color:#475569;padding:20px;font-size:12px">No open positions</div>';
  $('tab-multisig').innerHTML = html;
}

function renderAlerts() {
  const critical = S.violations.filter(v => v.severity === 'alert' && !v.approved);
  if (critical.length) {
    $('aBadge').classList.remove('hidden');
    $('aBadge').textContent = '⚠ ' + critical.length + ' ALERT' + (critical.length>1?'S':'');
    $('aBanner').classList.remove('hidden');
    $('aDetails').innerHTML = critical.slice(0,5).map(v => `<div style="margin-bottom:4px">• <strong>${v.type}</strong>: ${v.detail}</div>`).join('');
  } else {
    $('aBadge').classList.add('hidden');
    $('aBanner').classList.add('hidden');
  }
}

// ─── Main ───
async function init() {
  $('errBar').classList.add('hidden');
  $('pWrap').classList.remove('hidden');
  $('rBtn').disabled = true;
  $('pBar').style.width = '10%';
  
  try {
    // Balances + positions for trader and multisig + shared approvals, in parallel
    setStatus('Fetching balances & positions…');
    const usdcOf = tok => tok?.value?.[0]?.account?.data?.parsed?.info?.tokenAmount?.uiAmount ?? 0;
    const [tBal, tTok, msBal, msTok, traderPos, msPos, solPrice] = await Promise.all([
      rpc("getBalance", [W]),
      rpc("getTokenAccountsByOwner", [W,  {mint:USDC_MINT}, {encoding:"jsonParsed"}]).catch(() => null),
      rpc("getBalance", [MS]).catch(() => null),
      rpc("getTokenAccountsByOwner", [MS, {mint:USDC_MINT}, {encoding:"jsonParsed"}]).catch(() => null),
      fetchPositions(W),
      fetchPositions(MS),
      fetchSolPrice(),
      fetchSharedApprovals(),
    ]);
    S.sol = tBal.value / 1e9;
    S.usdc = usdcOf(tTok);
    S.ms.sol = msBal ? msBal.value / 1e9 : null;
    S.ms.usdc = usdcOf(msTok);
    S.positions = traderPos;
    S.ms.positions = msPos;
    S.solPrice = solPrice;
    $('pBar').style.width = '20%';
    
    // Fetch all transactions via Helius enhanced API
    S.allTxns = await fetchAllTrades();
    $('txCount').textContent = S.allTxns.length + ' txns loaded';
    
    // Parse Jupiter trades (filtered to tracking window)
    setStatus('Analyzing trades…');
    $('pBar').style.width = '92%';
    S.trades = parseTrades(S.allTxns).filter(t => t.time >= TRACKING_START);

    // Compliance check
    setStatus('Checking compliance…');
    S.violations = checkCompliance(S.trades);

    // Wallet-over-budget check (current snapshot, keyed per week so approval auto-expires Monday)
    const walletUsd = (S.sol||0) * (S.solPrice||0) + (S.usdc||0);
    if (walletUsd > BUDGET_WEEKLY && S.solPrice) {
      S.violations.unshift({
        type: 'WALLET', severity: 'alert', time: 0,
        sig: 'wallet:' + getWeekKey(new Date()),
        detail: `Wallet $${walletUsd.toFixed(2)} · rule is $${BUDGET_WEEKLY} max release/week (${(S.sol||0).toFixed(2)} SOL @ $${S.solPrice.toFixed(2)} + $${(S.usdc||0).toFixed(2)} USDC)`
      });
    }
    refreshApprovalState();

    // Weekly aggregation
    S.weeklyData = aggregateWeekly(S.trades);
    
    // Render everything
    $('pBar').style.width = '100%';
    setStatus('Done');
    renderOverview();
    renderTrades();
    renderCompliance();
    renderWeekly();
    renderMultisig();
    renderRules();
    renderAlerts();
    tickCooldown();

    $('statusDot').innerHTML = '<span style="color:#22c55e">●</span> live';
    S.lastUpdated = Date.now();
    tickFreshness();

  } catch(e) {
    $('errBar').classList.remove('hidden');
    $('errMsg').textContent = e.message;
    $('statusDot').innerHTML = '<span style="color:#ef4444">●</span> error';
  }
  
  $('pWrap').classList.add('hidden');
  $('rBtn').disabled = false;
  $('rBtn').textContent = '↻ Refresh';
}

// ─── Cooldown ───
function getNextMonday() {
  const d = new Date(), day = d.getDay();
  const daysUntilMonday = day === 1 ? 7 : (1 - day + 7) % 7 || 7;
  const mon = new Date(d); mon.setHours(0,0,0,0); mon.setDate(d.getDate() + daysUntilMonday);
  return mon;
}
function getCooldownKey() { return `COOLDOWN|cooldown:${getWeekKey(new Date())}|0`; }
function overrideCooldown() { return toggleApproval(getCooldownKey()); }
function isInCooldown() {
  if (isApproved(getCooldownKey(), 'COOLDOWN')) return null;
  const thisWeek = getWeekKey(new Date());
  const weekSpent = S.trades.filter(t => t.weekKey === thisWeek).reduce((sum,t) => sum + (t.usdcIn||0), 0);
  if (weekSpent >= BUDGET_WEEKLY) return { reason: `Used $${weekSpent.toFixed(2)} of $${BUDGET_WEEKLY} weekly budget` };
  if (S.solPrice && S.sol !== null) {
    const wallet = S.sol * S.solPrice + (S.usdc||0);
    if (wallet < 10) return { reason: `Wallet depleted — $${wallet.toFixed(2)}` };
  }
  return null;
}
function tickCooldown() {
  const banner = $('cooldownBanner'); if (!banner) return;
  const cd = isInCooldown();
  if (!cd) { banner.classList.add('hidden'); return; }
  banner.classList.remove('hidden');
  const next = getNextMonday();
  const ms = next.getTime() - Date.now();
  const days = Math.floor(ms/86400000);
  const hh = Math.floor((ms%86400000)/3600000);
  const mm = Math.floor((ms%3600000)/60000);
  const approvers = approversOf(getCooldownKey());
  const me = loadIdentity();
  const meDid = approvers.some(a => a.by === me);
  const btn = $('cooldownOverrideBtn');
  if (btn) {
    if (meDid) btn.textContent = 'undo my approval';
    else if (approvers.length === 1) btn.textContent = `approve (2nd of 2 · ${approvers[0].by} approved)`;
    else btn.textContent = 'override (needs Alvin & Ken)';
  }
  const note = approvers.length === 1 ? ` · ${approvers[0].by} approved, awaiting ${approvers[0].by==='alvin'?'Ken':'Alvin'}` : '';
  $('cooldownDetail').textContent = `${cd.reason}${note} · Next release ${next.toLocaleDateString('en-AU',{weekday:'short',day:'2-digit',month:'short'})} in ${days}d ${hh}h ${mm}m`;
}
setInterval(tickCooldown, 60_000);

// ─── Curfew countdown ───
function tickCurfew() {
  const el = $('curfew'); if (!el) return;
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const inCurfew = h >= 0 && h < 6;
  if (inCurfew) {
    el.style.color = '#ef4444';
    el.style.borderColor = '#ef4444';
    el.style.background = '#dc262615';
    el.innerHTML = `🌙 in curfew · ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    return;
  }
  const ms = new Date(now).setHours(24,0,0,0) - now.getTime();
  const hh = Math.floor(ms/3600000), mm = Math.floor((ms%3600000)/60000);
  let color = '#475569', border = '#1e293b', bg = 'transparent';
  if (h >= 23) { color = '#ef4444'; border = '#ef4444'; bg = '#dc262610'; }
  else if (h >= 22) { color = '#f59e0b'; border = '#f59e0b50'; bg = '#f59e0b10'; }
  el.style.color = color; el.style.borderColor = border; el.style.background = bg;
  el.innerHTML = `🌙 ${hh}h ${mm.toString().padStart(2,'0')}m to midnight`;
}
tickCurfew();
setInterval(tickCurfew, 30_000);

// ─── Freshness ticker + auto-refresh ───
function tickFreshness() {
  if (!S.lastUpdated) return;
  const secs = Math.floor((Date.now() - S.lastUpdated) / 1000);
  const rel = secs < 60 ? secs + 's ago' : secs < 3600 ? Math.floor(secs/60) + 'm ago' : Math.floor(secs/3600) + 'h ago';
  const stale = secs > REFRESH_MS/1000 * 2;
  $('updAt').innerHTML = `Updated <span style="color:${stale?'#f59e0b':'#475569'}">${rel}</span>`;
}
setInterval(tickFreshness, 1000);
setInterval(() => { if (!$('rBtn').disabled && document.visibilityState === 'visible') init(); }, REFRESH_MS);

$('who').value = loadIdentity();
renderRules();
init();
</script>
